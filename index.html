<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>버스 탑승 조사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #f2f2f2;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 16px 60px;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 32px 28px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.card-title { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
.card-sub { font-size: 13px; color: #888; line-height: 1.7; margin-bottom: 28px; }
.field { margin-bottom: 20px; }
.lbl { display: block; font-size: 12px; color: #666; margin-bottom: 7px; letter-spacing: 0.04em; }
.lbl em { color: #e07b54; font-style: normal; margin-left: 2px; }
input[type=text], input[type=tel] {
  width: 100%; height: 44px;
  border: 1px solid #e0e0e0; border-radius: 10px;
  padding: 0 14px; font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  color: #1a1a1a; background: #fafafa;
  outline: none; transition: border-color .2s; -webkit-appearance: none;
}
input[type=text]:focus, input[type=tel]:focus { border-color: #1a1a1a; background: #fff; }
.rgroup { display: flex; gap: 10px; }
.rbtn {
  flex: 1; height: 44px;
  border: 1px solid #e0e0e0; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px; color: #888; background: #fafafa;
  transition: all .15s; user-select: none;
  font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent;
}
.rbtn input { display: none; }
.rbtn.on { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
.cbox {
  background: #fafafa; border: 1px solid #e0e0e0; border-radius: 10px;
  padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
}
.clbl { font-size: 13px; color: #555; }
.cctrl { display: flex; align-items: center; gap: 16px; }
.cbtn {
  width: 32px; height: 32px; border: 1px solid #ddd; border-radius: 50%;
  background: #fff; color: #1a1a1a; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: monospace; line-height: 1; transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.cbtn:active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.cnum { font-size: 20px; font-weight: 500; color: #1a1a1a; min-width: 24px; text-align: center; }
.hid { display: none !important; }
.notice {
  font-size: 12px; color: #aaa; line-height: 1.9; margin-bottom: 24px;
  padding: 12px 14px; background: #fafafa; border-radius: 8px;
}
.submit-btn {
  width: 100%; height: 50px; background: #1a1a1a; color: #fff;
  border: none; border-radius: 12px; font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.15em;
  cursor: pointer; transition: background .2s; -webkit-tap-highlight-color: transparent;
}
.submit-btn:active { background: #444; }
.success {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; min-height: 300px; text-align: center;
}
.success-icon {
  width: 60px; height: 60px; border-radius: 50%; background: #1a1a1a; color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin: 0 auto 20px;
}
.success-title { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-bottom: 10px; }
.success-msg { font-size: 13px; color: #888; line-height: 1.8; white-space: pre-line; }
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 99;
}
.overlay.show { display: flex; }
.spinner {
  width: 36px; height: 36px;
  border: 2.5px solid rgba(255,255,255,0.2); border-top-color: #fff;
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div id="formWrap">
    <h1 class="card-title">버스 탑승 조사</h1>
    <p class="card-sub">결혼식 셔틀버스 탑승 여부를 알려주세요.<br>탑승 장소 및 시간은 추후 안내드립니다.</p>

    <div class="field">
      <label class="lbl">이름 <em>*</em></label>
      <input type="text" id="name" placeholder="성함을 입력해주세요" autocomplete="name">
    </div>

    <div class="field">
      <label class="lbl">연락처 <em>*</em></label>
      <input type="tel" id="phone" placeholder="010-0000-0000" autocomplete="tel">
    </div>

    <div class="field">
      <label class="lbl">버스 탑승 여부 <em>*</em></label>
      <div class="rgroup">
        <label class="rbtn" id="bY"><input type="radio" name="bus" value="yes"> 탑승할게요</label>
        <label class="rbtn" id="bN"><input type="radio" name="bus" value="no"> 개별 이동</label>
      </div>
    </div>

    <div class="field hid" id="cntWrap">
      <label class="lbl">탑승 인원</label>
      <div class="cbox">
        <span class="clbl">본인 포함 총 인원</span>
        <div class="cctrl">
          <button class="cbtn" onclick="chg(-1)" aria-label="인원 감소">−</button>
          <span class="cnum" id="cnum">1</span>
          <button class="cbtn" onclick="chg(1)" aria-label="인원 증가">+</button>
        </div>
      </div>
    </div>

    <div class="notice">
      · 탑승 장소 및 시간은 추후 개별 안내 예정입니다<br>
      · 수정이 필요하면 신랑/신부에게 문자 부탁드립니다
    </div>

    <button class="submit-btn" onclick="sub()">제출하기</button>
  </div>

  <div class="success" id="successWrap">
    <div class="success-icon">✓</div>
    <div class="success-title">응답해 주셔서 감사합니다</div>
    <p class="success-msg" id="successMsg"></p>
  </div>
</div>

<div class="overlay" id="overlay"><div class="spinner"></div></div>

<script>
  // ★ Google Apps Script 배포 URL로 교체하세요
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxpIGx9PVY-SdBkx3rb9AbCzZjhc3Ff8GL10EvdnAeIDX7qc3uUlVMyqv0MlacCfzUh/exec';

  let cnt = 1;

  function chg(d) {
    cnt = Math.max(1, Math.min(20, cnt + d));
    document.getElementById('cnum').textContent = cnt;
  }

  document.getElementById('bY').addEventListener('click', () => {
    document.querySelector('[name=bus][value=yes]').checked = true;
    document.getElementById('bY').classList.add('on');
    document.getElementById('bN').classList.remove('on');
    document.getElementById('cntWrap').classList.remove('hid');
  });
  document.getElementById('bN').addEventListener('click', () => {
    document.querySelector('[name=bus][value=no]').checked = true;
    document.getElementById('bN').classList.add('on');
    document.getElementById('bY').classList.remove('on');
    document.getElementById('cntWrap').classList.add('hid');
  });

  document.getElementById('phone').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '');
    if (v.length <= 3) this.value = v;
    else if (v.length <= 7) this.value = v.slice(0, 3) + '-' + v.slice(3);
    else this.value = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7, 11);
  });

  async function sub() {
    const name  = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const busEl = document.querySelector('[name=bus]:checked');

    if (!name)  { alert('이름을 입력해주세요.'); return; }
    if (!phone) { alert('연락처를 입력해주세요.'); return; }
    if (!busEl) { alert('버스 탑승 여부를 선택해주세요.'); return; }

    const bus    = busEl.value;
    const people = bus === 'yes' ? cnt : 0;

    const payload = {
      timestamp: new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' }),
      name,
      phone,
      bus:      bus === 'yes' ? '탑승' : '개별이동',
      busCount: people
    };

    document.getElementById('overlay').classList.add('show');

    try {
      const res = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain' },
        body:    JSON.stringify(payload)
      });

      document.getElementById('overlay').classList.remove('show');
      document.getElementById('formWrap').style.display  = 'none';
      document.getElementById('successWrap').style.display = 'flex';
      document.getElementById('successMsg').textContent =
        bus === 'yes'
          ? `버스 탑승 ${people}명으로 접수되었습니다.\n장소와 시간은 추후 안내드릴게요 :)`
          : '개별 이동으로 접수되었습니다.\n식장에서 뵙겠습니다 :)';
    } catch (err) {
      document.getElementById('overlay').classList.remove('show');
      alert('전송 중 오류가 발생했습니다.\n잠시 후 다시 시도해주세요.');
    }
  }
</script>
</body>
</html>
